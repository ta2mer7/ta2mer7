{% extends "base.html" %}
{% block content %}

<div class="container">
    <h2>Admin Logs</h2>

    <div class="log-box">
        {% for log in logs %}
        <div class="log-item">
            {{log.username}} - {{log.action}}
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}

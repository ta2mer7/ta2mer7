{% extends "base.html" %}
{% block content %}

<div class="container">
    <h2>URL Scanner</h2>

    <form method="POST">
        <input name="url" placeholder="https://example.com">
        <button>Scan URL</button>
    </form>

    {% if result %}
        <p>{{result}}</p>
    {% endif %}
</div>

{% endblock %}
